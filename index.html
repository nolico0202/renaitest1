<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>恋愛シミュレーション - アニメーション版</title>
    <style>
        body {
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
        }

        /* ゲーム画面全体のコンテナ */
        #game-container {
            width: 960px;
            height: 600px;
            background: linear-gradient(to bottom, #87CEEB, #e0f7fa);
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* ヒロイン画像：常時ふわふわ動くアニメーション（float）を設定 */
        #character {
            height: 90%;
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            object-fit: contain;
            z-index: 1;
            /* 4秒かけて上下にふわふわループするアニメーション */
            animation: float-animation 4s ease-in-out infinite;
            transition: filter 0.3s;
        }

        /* 【アニメーション1】常に呼吸しているようにふわふわ動く */
        @keyframes float-animation {
            0% {
                bottom: 0px;
                transform: translateX(-50%) scale(1);
            }
            50% {
                bottom: 12px; /* 少し上に浮く */
                transform: translateX(-50%) scale(1.01); /* 微妙に拡大して立体感を出す */
            }
            100% {
                bottom: 0px;
                transform: translateX(-50%) scale(1);
            }
        }

        /* 【アニメーション2】選択肢をクリックしたときに「ぴょこん」と跳ねる動き */
        .jump-effect {
            animation: jump-animation 0.4s ease-out !important;
        }

        @keyframes jump-animation {
            0% { bottom: 0px; }
            50% { bottom: 35px; } /* 上に跳ねる */
            100% { bottom: 0px; }
        }

        /* 左側：メッセージウィンドウ */
        #message-window {
            position: absolute;
            bottom: 40px;
            left: 30px;
            width: 380px;
            height: 160px;
            background-color: rgba(255, 255, 255, 0.85);
            border: 3px solid #ffb6c1;
            border-radius: 15px;
            padding: 20px;
            box-sizing: border-box;
            color: #333;
            z-index: 10;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* 右側：選択肢コンテナ */
        #choices-container {
            position: absolute;
            bottom: 40px;
            right: 30px;
            width: 380px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 10;
        }

        /* 名前ラベル */
        #character-name {
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 8px;
            color: #ff69b4;
            border-bottom: 2px solid #ffb6c1;
            display: inline-block;
        }

        #dialogue-text {
            font-size: 1.05em;
            line-height: 1.6;
        }

        /* 選択肢ボタン */
        .choice-btn {
            background-color: rgba(255, 182, 193, 0.9);
            color: white;
            border: none;
            padding: 15px 20px;
            font-size: 1em;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            box-shadow: 0 4px 0 #ff8da1;
        }

        .choice-btn:hover {
            background-color: #ff69b4;
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #e05596;
        }

        .choice-btn:active {
            transform: translateY(2px);
            box-shadow: 0 0 0;
        }

        /* 好感度表示 */
        #affection-meter {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            color: #ff69b4;
            z-index: 10;
            border: 2px solid #ffb6c1;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="affection-meter">❤ 好感度: <span id="affection-value">0</span></div>
        
        <img src="heroine.jpg" id="character" alt="ヒロイン">

        <div id="message-window">
            <div id="character-name">名前</div>
            <div id="dialogue-text">テキストがここに入ります。</div>
        </div>

        <div id="choices-container"></div>
    </div>

    <script>
        const story = {
            start: {
                name: "幼馴染",
                text: "「おはよう！ 今日もいい天気だね。一緒に学校行こ！」",
                choices: [
                    { text: "❤ おはよう！ 行こうか", next: "scene_happy", affectionChange: 10 },
                    { text: "💧 えー、めんどくさいなあ", next: "scene_sad", affectionChange: -5 }
                ]
            },
            scene_happy: {
                name: "幼馴染",
                text: "「えへへ、嬉しいな。あ、そういえば今日のテスト勉強した？」",
                choices: [
                    { text: "✨ ばっちりだよ", next: "end_good", affectionChange: 10 },
                    { text: "🌀 全然してない…", next: "end_normal", affectionChange: 0 }
                ]
            },
            scene_sad: {
                name: "幼馴染",
                text: "「むっ…相変わらず冷たいなあ。置いていくよ！」",
                choices: [
                    { text: "🙏 ごめんごめん、一緒に行くよ", next: "scene_happy", affectionChange: 5 },
                    { text: "🏃 勝手に行けば？", next: "end_bad", affectionChange: -10 }
                ]
            },
            end_good: {
                name: "幼馴染",
                text: "「さすが！ じゃあ今日の放課後、一緒に遊ぼうね！」<br><br><b>〜 Happy End 〜</b>",
                choices: [] 
            },
            end_normal: {
                name: "幼馴染",
                text: "「もう、しょうがないなあ。放課後教えてあげるよ。」<br><br><b>〜 Normal End 〜</b>",
                choices: []
            },
            end_bad: {
                name: "幼馴染",
                text: "「…バカ！ もう知らない！」<br><br><b>〜 Bad End 〜</b>",
                choices: []
            }
        };

        let affection = 0;

        const nameElement = document.getElementById("character-name");
        const textElement = document.getElementById("dialogue-text");
        const choicesContainer = document.getElementById("choices-container");
        const affectionValueElement = document.getElementById("affection-value");
        const characterElement = document.getElementById("character");

        // ヒロインにリアクション（ジャンプ）をさせる関数
        function triggerCharacterReaction() {
            // 一度クラスを削除して、再度追加することでアニメーションをリセット・実行する
            characterElement.classList.remove("jump-effect");
            // ズレを防止するため一瞬だけ待ってからクラスを付与
            void characterElement.offsetWidth; 
            characterElement.classList.add("jump-effect");
        }

        function renderScene(sceneId) {
            const sceneData = story[sceneId];
            nameElement.innerHTML = sceneData.name;
            textElement.innerHTML = sceneData.text;
            choicesContainer.innerHTML = "";

            if (sceneData.choices.length > 0) {
                sceneData.choices.forEach(choice => {
                    const button = document.createElement("button");
                    button.className = "choice-btn";
                    button.innerText = choice.text;
                    button.onclick = () => {
                        // 選択肢がクリックされたらヒロインをジャンプさせる
                        triggerCharacterReaction();

                        if (choice.affectionChange) {
                            affection += choice.affectionChange;
                            affectionValueElement.innerText = affection;
                        }
                        // アニメーションの余韻を感じさせるため、少しだけ遅らせて次の会話へ
                        setTimeout(() => {
                            renderScene(choice.next);
                        }, 200);
                    };
                    choicesContainer.appendChild(button);
                });
            } else {
                const resetButton = document.createElement("button");
                resetButton.className = "choice-btn";
                resetButton.innerText = "🔄 最初から遊ぶ";
                resetButton.onclick = () => {
                    affection = 0;
                    affectionValueElement.innerText = affection;
                    renderScene("start");
                };
                choicesContainer.appendChild(resetButton);
            }
        }

        renderScene("start");
    </script>
</body>
</html>
