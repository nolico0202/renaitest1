<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>恋愛シミュレーション プロトタイプ</title>
<style>
    /* 画面全体の基本設定 */
    body {
        margin: 0;
        padding: 0;
        overflow: hidden; /* スクロールバーを隠す */
        font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
        background-color: #222;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    /* ゲーム画面のコンテナ（16:9の比率を維持） */
    #game-container {
        position: relative;
        width: 100%;
        max-width: 1280px;
        aspect-ratio: 16 / 9;
        /* 背景画像がある場合はここに指定します（現在はCSSでダミー背景色） */
        background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
        background-size: cover;
        background-position: center;
        box-shadow: 0 0 15px rgba(0,0,0,0.8);
        overflow: hidden;
    }

    /* 背景画像用のレイヤー（必要に応じてimgタグに差し替えてください） */
    .bg-image {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 1;
    }

    /* === アニメーション設定 === */
    @keyframes sway {
        0% { transform: translateX(-50%) translateY(0px) rotate(0deg); }
        50% { transform: translateX(-50%) translateY(-6px) rotate(0.5deg); }
        100% { transform: translateX(-50%) translateY(0px) rotate(0deg); }
    }

    /* ヒロインの立ち絵 */
    #character {
        position: absolute;
        bottom: -5%; 
        left: 50%;
        transform: translateX(-50%);
        height: 95%; /* 画面に対するサイズ */
        z-index: 10;
        /* ゆったり動くアニメーション（風/呼吸） */
        animation: sway 4s ease-in-out infinite;
    }

    /* 好感度表示（右上） */
    #affection-display {
        position: absolute;
        top: 20px;
        right: 20px;
        background-color: #fff;
        color: #333;
