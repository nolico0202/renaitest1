<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>恋愛シミュレーション プロトタイプ</title>
<style>
    /* 画面全体の基本設定 */
    body {
        margin: 0;
        padding: 0;
        overflow: hidden; /* スクロールバーを隠す */
        font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
        background-color: #222; /* 画面全体の背景色 */
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    /* ゲーム画面のコンテナ（16:9の比率を維持） */
    #game-container {
        position: relative;
        width: 100%;
        max-width: 1280px; /* PCでの最大幅 */
        aspect-ratio: 16 / 9; /* 比率 */
        /* 背景画像をここに指定します。まだ画像がない場合は、背景色になります。 */
        background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
        background-size: cover;
        background-position: center;
        box-shadow: 0 0 15px rgba(0,0,0,0.8);
        overflow: hidden;
    }

    /* === アニメーション設定 === */
    @keyframes sway {
        0% { transform: translateX(-50%) translateY(0px) rotate(0deg); }
        50% { transform: translateX(-50%) translateY(-6px) rotate(0.5deg); }
        100% { transform: translateX(-50%) translateY(0px) rotate(0deg); }
    }

    /* ヒロインの立ち絵 */
    #character {
        position: absolute;
        bottom: -5%; /* 立ち絵を少し下に配置 */
        left: 50%;
        transform: translateX(-50%);
        height: 95%; /* 立ち絵の大きさ */
        z-index: 10;
        /* ゆったり動くアニメーション */
        animation: sway 4s ease-in-out infinite;
    }

    /* 好感度表示（右上） */
    #affection-display {
        position: absolute;
        top: 20px;
        right: 20px;
        background-color: #fff;
        color: #333;
        padding: 10px 25px;
        border-radius: 8px;
        font-size: 22px;
        font-weight: bold;
        z-index: 30;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        letter-spacing: 2px;
    }

    /* 選択肢のコンテナ（左右に配置） */
    #choices-container {
        position: absolute;
        top: 45%; /* 顔の下あたりに配置 */
        width: 100%;
        display: flex;
        justify-content: space-between; /* 左右に散らす */
        padding: 0 80px; /* 画面端からの余白 */
        box-sizing: border-box;
        z-index: 20;
    }

    /* 選択肢ボタンのデザイン */
    .choice-button {
        background-color: rgba(255, 255, 255, 0.95);
        border: 2px solid #eab8e4; /* 淡いピンク紫の枠線 */
        border-radius: 12px;
        padding: 15px 30px;
        font-size: 18px;
        color: #333;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 0 0 15px rgba(255, 255, 255, 0.8), 0 0 8px rgba(234, 184, 228, 0.6); /* 発光エフェクト */
        width: 320px;
        text-align: center;
        font-weight: bold;
    }

    .choice-button:hover {
        transform: scale(1.05); /* マウスオーバーで少し拡大 */
        background-color: #fff;
        box-shadow: 0 0 20px rgba(255, 255, 255, 1), 0 0 12px rgba(234, 184, 228, 0.8);
    }

    /* メッセージウィンドウ */
    #message-box {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        background-color: rgba(30, 30, 30, 0.85); /* 半透明の黒 */
        border: 2px solid #fff;
        border-radius: 12px;
        padding: 20px 30px;
        box-sizing: border-box;
        color: #fff;
        z-index: 30;
        min-height: 130px;
    }

    /* キャラクター名 */
    #character-name {
        color: #f1c40f; /* 提示画像の黄色に合わせて */
        font-size: 22px;
        font-weight: bold;
        margin-bottom: 12px;
        letter-spacing: 1px;
    }

    /* セリフテキスト */
    #message-text {
        font-size: 20px;
        line-height: 1.6;
        letter-spacing: 1px;
    }
</style>
</head>
<body>

<div id="game-container">
    <div id="affection-display">好感度：<span id="affection-score">0</span></div>

    <img id="character" src="ヒロインの画像のパス.png" alt="ヒロイン">

    <div id="choices-container">
        <div class="choice-button" onclick="selectChoice(1)">おはよう！ 行こうか</div>
        <div class="choice-button" onclick="selectChoice(2)">えー、めんどくさいなあ</div>
    </div>

    <div id="message-box">
        <div id="character-name">幼馴染</div>
        <div id="message-text">「おはよう！ 今日もいい天気だね。一緒に学校行こ！」</div>
    </div>
</div>

<script>
    // 好感度の初期値
    let affection = 0;

    // 選択肢をクリックした時の処理
    function selectChoice(choiceId) {
        const messageText = document.getElementById('message-text');
        const affectionScore = document.getElementById('affection-score');
        const choicesContainer = document.getElementById('choices-container');

        if (choiceId === 1) {
            // 「おはよう！ 行こうか」を選んだ場合
            messageText.innerText = "「うんっ！ 今日も一日がんばろーね！」";
            affection += 10;
        } else if (choiceId === 2) {
            // 「えー、めんどくさいなあ」を選んだ場合
            messageText.innerText = "「もう、相変わらずだなぁ…ほら、遅刻しちゃうよ！」";
            affection -= 5;
        }

        // 好感度の表示を更新
        affectionScore.innerText = affection;

        // 選択肢を非表示にする
        choicesContainer.style.display = 'none';
    }
</script>

</body>
</html>
