<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>恋愛シミュレーション - 口パクアニメーション版</title>
    <style>
        body {
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
        }

        /* ゲーム画面全体のコンテナ */
        #game-container {
            width: 960px;
            height: 600px;
            background: linear-gradient(to bottom, #87CEEB, #e0f7fa);
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* ヒロイン画像：プログラムの動きを消してスッキリさせました */
        #character {
            height: 90%;
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: flex-end; /* コンテナ下部に配置 */
        }

        /* --- ここから下に、新しいスタイルとアニメーションを追加 --- */

        /* 新規：アニメーションの定義（1.2秒周期でパクパクする） */
        @keyframes talkMouth {
            0%, 30%, 100% { opacity: 0; } /* 閉じる（開口画像の透明度0） */
            40%, 90% { opacity: 1; }    /* 開く（開口画像の透明度1） */
        }

        /* 新規：画像共通スタイル */
        #character img {
            max-height: 100%; /* コンテナいっぱいに */
            object-fit: contain;
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
        }

        /* 新規：閉じた口の画像 */
        #character img.heroine-mouth-closed {
            z-index: 1; /* 基礎 */
        }

        /* 新規：開いた口の画像 */
        #character img.heroine-mouth-open {
            z-index: 2; /* 上に配置 */
            opacity: 0; /* 初期は非表示 */
        }

        /* 新規：話している時（.speakingクラス適用時）にアニメーションを適用 */
        #character.speaking .heroine-mouth-open {
            animation: talkMouth 1.2s infinite; /* アニメーション適用 */
        }

        /* --- 元のUIスタイル --- */

        /* 左側：メッセージウィンドウ */
        #message-window {
            position: absolute;
            bottom: 40px;
            left: 30px;
            width: 380px;
            height: 160px;
            background-color: rgba(255, 255, 255, 0.85);
            border: 3px solid #ffb6c1;
            border-radius: 15px;
            padding: 20px;
            box-sizing: border-box;
            color: #333;
            z-index: 10;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* 右側：選択肢コンテナ */
        #choices-container {
            position: absolute;
            bottom: 40px;
            right: 30px;
            width: 380px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 10;
        }

        /* 名前ラベル */
        #character-name {
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 8px;
            color: #ff69b4;
            border-bottom: 2px solid #ffb6c1;
            display: inline-block;
        }

        #dialogue-text {
            font-size: 1.05em;
            line-height: 1.6;
        }

        /* 選択肢ボタン */
        .choice-btn {
            background-color: rgba(255, 182, 193, 0.9);
            color: white;
            border: none;
            padding: 15px 20px;
            font-size: 1em;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            box-shadow: 0 4px 0 #ff8da1;
        }

        .choice-btn:hover {
            background-color: #ff69b4;
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #e05596;
        }

        .choice-btn:active {
            transform: translateY(2px);
            box-shadow: 0 0 0;
        }

        /* 好感度表示 */
        #affection-meter {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            color: #ff69b4;
            z-index: 10;
            border: 2px solid #ffb6c1;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="affection-meter">❤ 好感度: <span id="affection-value">0</span></div>

        <div id="character">
            <img src="heroine.jpg" class="heroine-mouth-closed" alt="ヒロイン（閉口）">
            <img src="heroine2.jpg" class="heroine-mouth-open" alt="ヒロイン（開口）">
        </div>

        <div id="message-window">
            <div id="character-name">名前</div>
            <div id="dialogue-text">テキストがここに入ります。</div>
        </div>

        <div id="choices-container"></div>
    </div>

    <script>
        // ストーリーデータ
        const story = {
            start: {
                name: "幼馴染",
                text: "「おはよう！ 今日もいい天気だね。一緒に学校行こ！」",
                choices: [
                    { text: "❤ おはよう！ 行こうか", next: "scene_happy", affectionChange: 10 },
                    { text: "💧 えー、めんどくさいなあ", next: "scene_sad", affectionChange: -5 }
                ]
            },
            scene_happy: {
                name: "幼馴染",
                text: "「えへへ、嬉しいな。あ、そういえば今日のテスト勉強した？」",
                choices: [
                    { text: "✨ ばっちりだよ", next: "end_good", affectionChange: 10 },
                    { text: "🌀 全然してない…", next: "end_normal", affectionChange: 0 }
                ]
            },
            scene_sad: {
                name: "幼馴染",
                text: "「むっ…相変わらず冷たいなあ。置いていくよ！」",
                choices: [
                    { text: "🙏 ごめんごめん、一緒に行くよ", next: "scene_happy", affectionChange: 5 },
                    { text: "🏃 勝手に行けば？", next: "end_bad", affectionChange: -10 }
                ]
            },
            end_good: {
                name: "幼馴染",
                text: "「さすが！ じゃあ今日の放課後、一緒に遊ぼうね！」<br><br><b>〜 Happy End 〜</b>",
                choices: []
            },
            end_normal: {
                name: "幼馴染",
                text: "「もう、しょうがないなあ。放課後教えてあげるよ。」<br><br><b>〜 Normal End 〜</b>",
                choices: []
            },
            end_bad: {
                name: "幼馴染",
                text: "「…バカ！ もう知らない！」<br><br><b>〜 Bad End 〜</b>",
                choices: []
            }
        };

        let affection = 0;
        const nameElement = document.getElementById("character-name");
        const textElement = document.getElementById("dialogue-text");
        const choicesContainer = document.getElementById("choices-container");
        const affectionValueElement = document.getElementById("affection-value");

        // シーンを描画する関数
        function renderScene(sceneId) {
            const sceneData = story[sceneId];
            nameElement.innerHTML = sceneData.name;
            textElement.innerHTML = sceneData.text;
            choicesContainer.innerHTML = "";

            // --- 新規：口パクアニメーションの制御 ---
            const characterElement = document.getElementById("character");
            // アニメーションを一旦リセット
            characterElement.classList.remove("speaking");

            if (sceneData.name) {
                // 名前がある（ヒロインが話している）場合、アニメーションを開始
                characterElement.classList.add("speaking");
            }

            if (sceneData.choices.length > 0) {
                // 選択肢がある場合、選択肢表示中もアニメーションを継続
                sceneData.choices.forEach(choice => {
                    const button = document.createElement("button");
                    button.className = "choice-btn";
                    button.innerText = choice.text;
                    button.onclick = () => {
                        // アニメーションを一旦停止してからシーンを遷移
                        characterElement.classList.remove("speaking");
                        
                        if (choice.affectionChange) {
                            affection += choice.affectionChange;
                            affectionValueElement.innerText = affection;
                        }
                        renderScene(choice.next);
                    };
                    choicesContainer.appendChild(button);
                });
            } else {
                // 終了シーン
                // 終了シーンではアニメーションを停止
                characterElement.classList.remove("speaking");

                const resetButton = document.createElement("button");
                resetButton.className = "choice-btn";
                resetButton.innerText = "🔄 最初から遊ぶ";
                resetButton.onclick = () => {
                    affection = 0;
                    affectionValueElement.innerText = affection;
                    renderScene("start");
                };
                choicesContainer.appendChild(resetButton);
            }
        }

        // 初期シーンの描画
        renderScene("start");
    </script>
</body>
</html>
